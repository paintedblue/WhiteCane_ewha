name: whitecane
description: "WhiteCane - 현재 위치 조회 및 목적지 안내 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_naver_map: ^1.4.4
  dio: ^5.7.0
  get: ^4.6.6
  get_it: ^8.0.3
  google_nav_bar: ^5.0.7
  sizing: ^1.1.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
